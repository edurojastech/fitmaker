<svg viewBox="0 0 500 600" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- Background elements -->
  <defs>
    <linearGradient id="bodyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e8e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d0d0d0;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowBg" cx="50%" cy="30%">
      <stop offset="0%" style="stop-color:#ff6a00;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ff2d2d;stop-opacity:0.1" />
    </radialGradient>
  </defs>

  <!-- Glow background circles -->
  <circle cx="450" cy="100" r="120" fill="#ff6a00" opacity="0.15"/>
  <circle cx="80" cy="500" r="100" fill="#ff2d2d" opacity="0.15"/>

  <!-- Head -->
  <ellipse cx="250" cy="80" rx="35" ry="40" fill="#d4a574"/>

  <!-- Neck -->
  <rect x="235" y="115" width="30" height="20" fill="#d4a574"/>

  <!-- Shoulders and chest -->
  <path d="M 200 135 Q 200 120 250 110 Q 300 120 300 135 L 310 200 Q 310 240 290 280 Q 250 300 210 280 Q 190 240 190 200 Z" fill="url(#bodyGradient)" stroke="#999" stroke-width="1"/>

  <!-- Right arm (holding dumbbell) -->
  <path d="M 300 160 Q 330 150 350 170 Q 360 180 365 200" stroke="#d4a574" stroke-width="18" fill="none" stroke-linecap="round"/>

  <!-- Left arm -->
  <path d="M 200 160 Q 170 155 150 190" stroke="#d4a574" stroke-width="16" fill="none" stroke-linecap="round"/>

  <!-- Abs definition -->
  <line x1="245" y1="160" x2="245" y2="240" stroke="#999" stroke-width="1" opacity="0.5"/>
  <circle cx="240" cy="180" r="3" fill="#999" opacity="0.3"/>
  <circle cx="250" cy="180" r="3" fill="#999" opacity="0.3"/>
  <circle cx="240" cy="210" r="3" fill="#999" opacity="0.3"/>
  <circle cx="250" cy="210" r="3" fill="#999" opacity="0.3"/>

  <!-- Dumbbell in right hand -->
  <g transform="translate(365, 210)">
    <!-- Dumbbell handle -->
    <rect x="-8" y="-40" width="16" height="80" fill="#333" rx="2"/>
    <!-- Left weight plate -->
    <ellipse cx="0" cy="-45" rx="22" ry="8" fill="#222"/>
    <ellipse cx="0" cy="-40" rx="20" ry="6" fill="#333"/>
    <!-- Right weight plate -->
    <ellipse cx="0" cy="45" rx="22" ry="8" fill="#222"/>
    <ellipse cx="0" cy="40" rx="20" ry="6" fill="#333"/>
    <!-- Weight details -->
    <text x="0" y="-35" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">25</text>
    <text x="0" y="55" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">25</text>
  </g>

  <!-- Shorts -->
  <path d="M 210 280 Q 200 300 200 350 L 200 380 L 300 380 L 300 350 Q 300 300 290 280" fill="#1a1a1a" stroke="#333" stroke-width="1"/>

  <!-- Shorts detail lines -->
  <line x1="245" y1="280" x2="245" y2="380" stroke="#333" stroke-width="1"/>

  <!-- Left leg -->
  <path d="M 220 380 L 215 520 L 235 520 L 240 380" fill="#d4a574" stroke="#999" stroke-width="1"/>

  <!-- Right leg -->
  <path d="M 260 380 L 265 520 L 285 520 L 280 380" fill="#d4a574" stroke="#999" stroke-width="1"/>

  <!-- Left shoe -->
  <ellipse cx="225" cy="530" rx="12" ry="8" fill="#333"/>
  <ellipse cx="225" cy="525" rx="10" ry="5" fill="#555"/>

  <!-- Right shoe -->
  <ellipse cx="275" cy="530" rx="12" ry="8" fill="#333"/>
  <ellipse cx="275" cy="525" rx="10" ry="5" fill="#555"/>

  <!-- Hair detail -->
  <path d="M 215 50 Q 215 30 250 20 Q 285 30 285 50" fill="#333" opacity="0.8"/>

  <!-- Face detail - eyes -->
  <circle cx="240" cy="75" r="3" fill="#333"/>
  <circle cx="260" cy="75" r="3" fill="#333"/>

  <!-- Stats badges background elements would go here if using with SVG filters -->
</svg>